name: Build ClearEQ plugin packages

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows VST3 + Standalone
            os: windows-2022
            configure: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
            build: cmake --build build --config Release --parallel
            artifact: ClearEQ-Windows-VST3-Standalone
            paths: |
              build/ClearEQ_artefacts/Release/VST3/ClearEQ.vst3/**
              build/ClearEQ_artefacts/Release/Standalone/ClearEQ.exe
              installer-output/ClearEQ-v*-Windows-Setup.exe
          - name: macOS VST3 + AU + Standalone
            os: macos-latest
            configure: cmake -S . -B build -G Xcode -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15 "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
            build: cmake --build build --config Release --parallel
            artifact: ClearEQ-macOS-VST3-AU-Standalone
            paths: |
              build/ClearEQ_artefacts/Release/VST3/ClearEQ.vst3/**
              build/ClearEQ_artefacts/Release/AU/ClearEQ.component/**
              build/ClearEQ_artefacts/Release/Standalone/ClearEQ.app/**
          - name: Linux VST3 + Standalone
            os: ubuntu-latest
            configure: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            build: cmake --build build --config Release --parallel
            artifact: ClearEQ-Linux-VST3-Standalone
            paths: |
              build/ClearEQ_artefacts/Release/VST3/ClearEQ.vst3/**
              build/ClearEQ_artefacts/Release/Standalone/ClearEQ

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux JUCE dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libjack-jackd2-dev ladspa-sdk \
            libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev \
            libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: ${{ matrix.configure }}

      - name: Build
        run: ${{ matrix.build }}

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & $iscc installer\ClearEQ.iss "/DSourceDir=$env:GITHUB_WORKSPACE\build\ClearEQ_artefacts\Release" "/DOutputDir=$env:GITHUB_WORKSPACE\installer-output"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
